<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="stylesheet3.css">
</head>

<body>

    <h1>Sign Up</h1>

    <form class="para1" onsubmit="return validateForm();">

        <label><b>First Name:</b></label>
        <input type="text" name="firstname" maxlength="25" placeholder="Enter First Name..." required>

        <label>Middle Name:</label>
        <input type="text" name="middlename" maxlength="25" placeholder="Enter Middle Name..." required>

        <label>Last Name:</label>
        <input type="text" name="lastname" maxlength="25" placeholder="Enter Last Name..." required>

        <label>Unit:</label>
        <select required>
            <option value="">Select Unit</option>
            <option value="Choir">Choir</option>
            <option value="Technical">Technical Unit</option>
            <option value="Sanitary">Sanitary Unit</option>
            <option value="Hospitality">Hospitality</option>
            <option value="Security">Security</option>
            <option value="Teen Choir">Teen Choir</option>
            <option value="Prayer Band">Prayer Band</option>
            <option value="Usher">Ushering Unit</option>
        </select>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male" required> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Custom"> Custom<br><br>

        <label>Phone:</label>
        <input type="text" name="phone" value="+234" maxlength="15" required>

        <label>Address:</label>
        <textarea cols="80" rows="5" placeholder="Enter Address..." required></textarea>

        <label>Date of Birth:</label>
        <input type="date" name="dob" required>

        <label>Age:</label>
        <input type="number" min="18" max="65" required>

        <label>Email:</label>
        <input type="email" placeholder="Enter Your Email..." required>

        <label>Password:</label>
        <input type="password" id="password" placeholder="Enter Password..." required>

        <label>Confirm Password:</label>
        <input type="password" id="confirmPassword" placeholder="Confirm Password..." required>

        <button type="submit" class="button">
            <b>Sign Up</b>
        </button>

        <br><br>

        <a href="Login.html"><button type="button">LOGIN</button></a>
        <a href="index.html"><button type="button">Cancel</button></a>

        <br><br>
        <b><i><span style="color: red;">THANKS FOR SIGNING UP</span></i></b>

    </form>

<script>
function validateForm() {
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirmPassword").value;

    if (pass !== confirm) {
        alert("Passwords do not match!");
        return false;
    }

    // go to next page after success
    window.location.href = "continue.html";
    return false;
}
</script>

</body>
</html>
