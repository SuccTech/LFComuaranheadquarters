<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="stylesheet4.css">
</head>

<body>

    <h1>Login</h1>

    <form class="para1" action="continue.html">

        <label>Username:</label>
        <input 
            type="text" 
            name="username" 
            maxlength="25" 
            placeholder="Enter Username" 
            required>

        <label>Password:</label>
        <input 
            type="password" 
            name="password" 
            placeholder="Enter Your Password..." 
            required>

        <label>
            <input type="checkbox" checked required>
            Remember Me
        </label>

        <button type="submit" class="button1"><b>Login</b></button>

        <br><br>

        <a href="Forgot Password.html">
            <button type="button" class="button2"><b>Forgot Password</b></button>
        </a>

        <a href="Sign Up.html">
            <button type="button" class="button2"><b>Register</b></button>
        </a>

        <a href="Email.html">
            <button type="button" class="button2"><b>Email Login</b></button>
        </a>

    </form>

</body>
</html>
